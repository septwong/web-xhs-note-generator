<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>小红书封面生成器</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="../fonts/fonts.css" />

  <style>
    /* ==================== 基础样式 ==================== */
    body {
      font-family: "Inter", "Noto Sans SC", sans-serif;
      background-color: #f3f4f6;
      overflow: hidden;
      touch-action: none;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }

    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }

    /* 拖拽条 */
    .resizer {
      width: 4px;
      background-color: #e5e7eb;
      cursor: col-resize;
      transition: background-color 0.2s;
      position: relative;
      z-index: 40;
      flex-shrink: 0;
      touch-action: none;
    }
    .resizer::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: -15px;
      right: -15px;
      z-index: 40;
    }
    .resizer:hover,
    .resizer.active {
      background-color: #3b82f6;
    }

    /* 折叠按钮 */
    .toggle-btn {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 24px;
      height: 60px;
      background: white;
      border: 1px solid #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 50;
      color: #4b5563;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      transition: all 0.2s;
      border-radius: 4px;
    }
    .toggle-btn:hover {
      background: #f3f4f6;
      color: #000;
      transform: translateY(-50%) scale(1.1);
    }
    #left-toggle { right: -28px; border-radius: 0 8px 8px 0; border-left: none; }
    #right-toggle { left: -28px; border-radius: 8px 0 0 8px; border-right: none; }

    .panel-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

    /* 裁剪遮罩 */
    .crop-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      display: none;
    }
    .crop-overlay.active {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .crop-container {
      position: relative;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
      max-width: 90vw;
      max-height: 90vh;
    }
    .crop-canvas-container {
      position: relative;
      overflow: hidden;
      cursor: crosshair;
    }
    .crop-canvas-container img {
      display: block;
      max-width: 100vw;
      max-height: 80vh;
    }
    .crop-selection {
      position: absolute;
      border: 2px solid #FF2442;
      background: rgba(255, 36, 66, 0.2);
      cursor: move;
    }
    .crop-handle {
      position: absolute;
      width: 12px;
      height: 12px;
      background: #FF2442;
      border-radius: 50%;
      cursor: grab;
    }
    .crop-handle.nw { top: -6px; left: -6px; cursor: nw-resize; }
    .crop-handle.ne { top: -6px; right: -6px; cursor: ne-resize; }
    .crop-handle.sw { bottom: -6px; left: -6px; cursor: sw-resize; }
    .crop-handle.se { bottom: -6px; right: -6px; cursor: se-resize; }
    .crop-controls {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #e5e7eb;
    }
    .crop-btn {
      padding: 8px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid #e5e7eb;
      background: white;
      transition: all 0.2s;
    }
    .crop-btn:hover { background: #f3f4f6; }
    .crop-btn.primary {
      background: #FF2442;
      color: white;
      border-color: #FF2442;
    }
    .crop-btn.primary:hover { background: #E51E3B; }
    .crop-ratio-selector {
      display: flex;
      gap: 8px;
    }
    .crop-ratio-btn {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      border: 1px solid #e5e7eb;
      background: white;
      cursor: pointer;
      transition: all 0.2s;
    }
    .crop-ratio-btn.active {
      background: #FF2442;
      color: white;
      border-color: #FF2442;
    }

    /* 封面画布 */
    #cover-canvas {
      width: 375px;
      height: 500px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      transition: width 0.3s ease, height 0.3s ease;
    }

    /* ==================== 主题样式 ==================== */
    .theme-minimal { --bg: #EBF5FB; --text: #1E3A5F; --accent: #3498DB; }
    .theme-minimal .cover-title { color: var(--text); font-family: "Inter", "Noto Sans SC", sans-serif; }
    .theme-minimal .cover-subtitle { color: #566573; font-family: "Inter", "Noto Sans SC", sans-serif; }

    .theme-serif { --bg: #F2EFE9; --text: #2c2c2c; --accent: #B85C5C; }
    .theme-serif .cover-title { color: var(--text); font-family: "Noto Serif SC", serif; }
    .theme-serif .cover-subtitle { color: #555; font-family: "FangSong", serif; }

    .theme-acid { --bg: #CCFF00; --text: #000; --accent: #000; }
    .theme-acid .cover-title { color: var(--text); font-family: "Noto Sans SC", sans-serif; }
    .theme-acid .cover-subtitle { color: var(--text); font-family: "Noto Sans SC", sans-serif; }

    .theme-tech { --bg: #0F172A; --text: #E2E8F0; --accent: #3B82F6; }
    .theme-tech .cover-title { color: var(--text); font-family: "Inter", "Noto Sans SC", sans-serif; }
    .theme-tech .cover-subtitle { color: #94A3B8; font-family: "Inter", "Noto Sans SC", sans-serif; }

    /* ==================== 交互样式 ==================== */
    .btn-primary {
      background: #FF2442;
      color: white;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: #E51E3B; }
    .btn-primary:active { transform: scale(0.95); }

    .theme-btn {
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }
    .theme-btn.active {
      border-color: #000;
      background: #000;
      color: white;
    }
    .theme-btn.active::before {
      content: "";
      position: absolute;
      top: 0; left: 0; width: 3px; height: 100%;
      background: linear-gradient(180deg, #FF2442, #FF4D6D);
    }

    /* 颜色选择器 */
    .color-picker-wrapper { cursor: pointer; }
    .color-picker-wrapper input { cursor: pointer; }

    /* 预设按钮 */
    .preset-btn {
      transition: all 0.2s;
      border: 1px solid #e5e7eb;
    }
    .preset-btn:hover {
      border-color: #FF2442;
      background: #FFF5F7;
      transform: translateY(-1px);
    }

    /* Toast 提示 */
    .toast {
      position: fixed;
      bottom: 32px;
      right: 32px;
      background: #FF2442;
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      display: flex;
      align-items: center;
      gap: 8px;
      z-index: 100;
      animation: slideIn 0.3s ease;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    @keyframes slideOut {
      from { transform: translateX(0); opacity: 1; }
      to { transform: translateX(100%); opacity: 0; }
    }
  </style>
</head>
<body class="flex h-screen w-full overflow-hidden">
  <!-- Left Panel: Configuration -->
  <aside id="left-panel" class="bg-white border-r border-gray-200 flex flex-col z-20 shadow-xl shrink-0 panel-transition relative" style="width: 380px;">
    <div class="h-12 border-b border-gray-100 flex items-center justify-between px-4 shrink-0 bg-white">
      <h2 class="font-bold text-sm flex items-center gap-2">
        <i data-lucide="sliders-vertical" size="14"></i> 封面配置
      </h2>
    </div>

    <div class="flex-1 overflow-y-auto custom-scrollbar p-5 space-y-6">
      <!-- Image Section -->
      <div>
        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">封面图片</h3>
        <div class="relative aspect-[3/4] bg-gray-50 rounded-xl border-2 border-dashed border-gray-300 hover:border-red-400 transition-colors cursor-pointer overflow-visible group"
             onclick="document.getElementById('cover-image-upload').click()" style="padding-bottom: 32px;">
          <img id="cover-preview" class="w-full h-full object-cover" style="display: none; border-radius: 12px;">
          <div id="cover-placeholder" class="absolute inset-0 flex flex-col items-center justify-center text-gray-400 group-hover:text-red-500 transition-colors rounded-xl">
            <i data-lucide="image" size="40" class="mb-2"></i>
            <span class="text-xs font-medium">点击上传封面</span>
            <span class="text-[10px] mt-1 opacity-60">建议 3:4 比例</span>
          </div>
          <input type="file" id="cover-image-upload" accept="image/*" class="hidden" onchange="handleCoverImage(this)">
          <div class="absolute top-2 right-2 flex flex-col gap-2 z-10">
            <button id="clear-cover-btn" onclick="clearCover(event)" class="bg-black/50 hover:bg-red-600 text-white p-1.5 rounded-lg transition-opacity opacity-0 group-hover:opacity-100 shadow-lg"
                    style="display: none;">
              <i data-lucide="trash-2" size="14"></i>
            </button>
            <button id="crop-btn" onclick="openCropModal(event)" class="bg-black/50 hover:bg-red-600 text-white p-1.5 rounded-lg transition-opacity opacity-0 group-hover:opacity-100 shadow-lg"
                    title="裁剪封面">
              <i data-lucide="crop" size="14"></i>
            </button>
          </div>
        </div>
      </div>
          </button>
        </div>
      </div>

      <!-- Text Content Section -->
      <div class="space-y-4 pt-4 border-t border-gray-100">
        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">文本内容</h3>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">标题</label>
          <input type="text" id="input-title" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:bg-white focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all"
                 value="小红书封面标题" oninput="updatePreview()">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">副标题/简介</label>
          <textarea id="input-subtitle" rows="3" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none focus:bg-white focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all"
                    oninput="updatePreview()">这是我的封面简介内容</textarea>
        </div>

        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">日期</label>
            <input type="text" id="input-date" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:bg-white focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all"
                   oninput="updatePreview()">
          </div>
          <div>
            <label class="block text-xs font-bold text-gray-600 mb-1">作者/标签</label>
            <input type="text" id="input-author" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:bg-white focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none transition-all"
                   value="@我的账号" oninput="updatePreview()">
          </div>
        </div>
      </div>

      <!-- Typography Section -->
      <div class="space-y-4 pt-4 border-t border-gray-100">
        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">文字样式</h3>

        <div>
          <div class="flex justify-between text-xs mb-2">
            <span class="text-gray-600 font-medium">标题字号</span>
            <span id="title-size-val" class="font-mono text-gray-500">42px</span>
          </div>
          <input type="range" id="input-title-size" min="24" max="80" value="42" step="1"
                 class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-red-500"
                 oninput="updatePreview()">
        </div>

        <div>
          <div class="flex justify-between text-xs mb-2">
            <span class="text-gray-600 font-medium">副标题字号</span>
            <span id="subtitle-size-val" class="font-mono text-gray-500">16px</span>
          </div>
          <input type="range" id="input-subtitle-size" min="12" max="32" value="16" step="1"
                 class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-red-500"
                 oninput="updatePreview()">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">标题字体</label>
          <div class="relative">
            <select id="input-title-font" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm appearance-none cursor-pointer focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none"
                    onchange="updatePreview()">
              <option value="Inter">Inter (英文)</option>
              <option value="Noto Sans SC">Noto Sans SC (中文)</option>
              <option value="Noto Serif SC">Noto Serif SC (衬线)</option>
            </select>
            <i data-lucide="chevron-down" size="16" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">副标题字体</label>
          <div class="relative">
            <select id="input-subtitle-font" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm appearance-none cursor-pointer focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none"
                    onchange="updatePreview()">
              <option value="Inter">Inter (英文)</option>
              <option value="Noto Sans SC">Noto Sans SC (中文)</option>
              <option value="Noto Serif SC">Noto Serif SC (衬线)</option>
            </select>
            <i data-lucide="chevron-down" size="16" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
          </div>
        </div>
      </div>

      <!-- Layout Section -->
      <div class="space-y-4 pt-4 border-t border-gray-100">
        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">布局设置</h3>

        <div>
          <div class="flex justify-between text-xs mb-2">
            <span class="text-gray-600 font-medium">文字间距</span>
            <span id="spacing-val" class="font-mono text-gray-500">24px</span>
          </div>
          <input type="range" id="input-spacing" min="10" max="60" value="24" step="1"
                 class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-red-500"
                 oninput="updatePreview()">
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">文字对齐</label>
          <div class="grid grid-cols-3 gap-2">
            <button onclick="setTextAlign('left')" id="align-left" class="flex items-center justify-center p-2 border border-gray-200 rounded-lg hover:border-red-400 hover:bg-red-50 transition-all"
                    data-value="left"><i data-lucide="align-left" size="16"></i></button>
            <button onclick="setTextAlign('center')" id="align-center" class="flex items-center justify-center p-2 border border-gray-200 rounded-lg hover:border-red-400 hover:bg-red-50 transition-all"
                    data-value="center"><i data-lucide="align-center" size="16"></i></button>
            <button onclick="setTextAlign('right')" id="align-right" class="flex items-center justify-center p-2 border border-gray-200 rounded-lg hover:border-red-400 hover:bg-red-50 transition-all"
                    data-value="right"><i data-lucide="align-right" size="16"></i></button>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-1">布局方向</label>
          <div class="relative">
            <select id="input-layout" class="w-full bg-gray-50 border border-gray-200 rounded-lg px-3 py-2 text-sm appearance-none cursor-pointer focus:border-red-500 focus:ring-1 focus:ring-red-500 outline-none"
                    onchange="updatePreview()">
              <option value="vertical">垂直布局 (推荐)</option>
              <option value="horizontal">水平布局</option>
            </select>
            <i data-lucide="chevron-down" size="16" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none"></i>
          </div>
        </div>
      </div>

      <!-- Padding Section -->
      <div class="space-y-4 pt-4 border-t border-gray-100 pb-4">
        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">内边距</h3>

        <div>
          <div class="flex justify-between text-xs mb-2">
            <span class="text-gray-600 font-medium">内边距大小</span>
            <span id="padding-val" class="font-mono text-gray-500">40px</span>
          </div>
          <input type="range" id="input-padding" min="10" max="80" value="40" step="2"
                 class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-red-500"
                 oninput="updatePreview()">
        </div>
      </div>
    </div>

    <div id="left-toggle" class="toggle-btn" onclick="togglePanel('left')" title="折叠/展开">
      <i data-lucide="chevron-left" size="16"></i>
    </div>
  </aside>

  <div id="resizer-left" class="resizer"></div>

  <!-- Center: Preview -->
  <main class="flex-1 bg-[#E5E5E5] relative flex flex-col overflow-hidden">
    <!-- Preview Container -->
    <div id="preview-container" class="flex-1 overflow-auto p-8 flex justify-center custom-scrollbar bg-[#E5E5E5]">
      <div class="relative">
        <div id="cover-canvas" class="relative shadow-2xl transition-all">
          <!-- Cover content rendered here -->
        </div>
      </div>
    </div>

    <!-- Floating Action Button -->
    <div class="absolute bottom-6 right-6 z-50">
      <button onclick="exportCover()" class="btn-primary px-8 py-3 rounded-full shadow-2xl flex items-center gap-2 font-bold text-white hover:scale-105 active:scale-95 transition-all">
        <i data-lucide="download" size="20"></i>
        <span>导出封面</span>
      </button>
    </div>
  </main>

  <div id="resizer-right" class="resizer"></div>

  <!-- Right Panel: Theme Selection -->
  <aside id="right-panel" class="bg-white border-l border-gray-200 flex flex-col z-20 shadow-xl shrink-0 panel-transition relative" style="width: 300px;">
    <div class="h-12 border-b border-gray-100 flex items-center justify-between px-4 shrink-0 bg-white">
      <h2 class="font-bold text-sm flex items-center gap-2">
        <i data-lucide="palette" size="14"></i> 风格主题
      </h2>
    </div>

    <div class="flex-1 overflow-y-auto custom-scrollbar p-5 space-y-6">
      <!-- Theme Grid -->
      <div>
        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-3">选择主题</h3>
        <div class="grid grid-cols-2 gap-3" id="theme-grid">
          <!-- Theme buttons will be generated by JS -->
        </div>
      </div>

      <!-- Theme Customization -->
      <div class="space-y-4 pt-4 border-t border-gray-100">
        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">主题自定义</h3>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-2">背景颜色</label>
          <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg border border-gray-200">
            <input type="color" id="theme-bg-color" class="w-10 h-10 rounded cursor-pointer border-0 p-0"
                   onchange="updateThemeColors()">
            <span class="text-xs text-gray-500 font-mono flex-1" id="theme-bg-display">自动</span>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-2">文字颜色</label>
          <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg border border-gray-200">
            <input type="color" id="theme-text-color" class="w-10 h-10 rounded cursor-pointer border-0 p-0"
                   onchange="updateThemeColors()">
            <span class="text-xs text-gray-500 font-mono flex-1" id="theme-text-display">自动</span>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-2">强调色</label>
          <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg border border-gray-200">
            <input type="color" id="theme-accent-color" class="w-10 h-10 rounded cursor-pointer border-0 p-0"
                   onchange="updateThemeColors()">
            <span class="text-xs text-gray-500 font-mono flex-1" id="theme-accent-display">自动</span>
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-gray-600 mb-2">标题颜色</label>
          <div class="flex items-center gap-3 p-3 bg-gray-50 rounded-lg border border-gray-200">
            <input type="color" id="theme-title-color" class="w-10 h-10 rounded cursor-pointer border-0 p-0"
                   onchange="updateThemeColors()">
            <span class="text-xs text-gray-500 font-mono flex-1" id="theme-title-display">自动</span>
          </div>
        </div>
      </div>

      <!-- Background Options -->
      <div class="space-y-3 pt-4 border-t border-gray-100">
        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">背景选项</h3>

        <label class="flex items-center justify-between p-3 bg-gray-50 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-100 transition-colors">
          <span class="text-sm text-gray-700">显示网格背景</span>
          <input type="checkbox" id="show-grid-bg" class="w-5 h-5 rounded text-red-500 focus:ring-red-500" onchange="updatePreview()">
        </label>

        <label class="flex items-center justify-between p-3 bg-gray-50 rounded-lg border border-gray-200 cursor-pointer hover:bg-gray-100 transition-colors">
          <span class="text-sm text-gray-700">显示底部渐变遮罩</span>
          <input type="checkbox" id="show-overlay" class="w-5 h-5 rounded text-red-500 focus:ring-red-500" checked onchange="updatePreview()">
        </label>

        <div id="overlay-opacity-container" class="pl-8">
          <label class="block text-xs font-bold text-gray-600 mb-1">遮罩透明度</label>
          <input type="range" id="input-overlay-opacity" min="0" max="1" step="0.1" value="0.4"
                 class="w-full h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-red-500"
                 oninput="updatePreview()">
        </div>
      </div>

      <!-- Layout Presets -->
      <div class="space-y-3 pt-4 border-t border-gray-100">
        <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest">快速预设</h3>
        <div class="grid grid-cols-2 gap-2">
          <button class="preset-btn flex items-center justify-center gap-2 py-2 px-3 rounded-lg text-sm font-medium" onclick="applyPreset('full-image')">
            <i data-lucide="image" size="14"></i> 全图式
          </button>
          <button class="preset-btn flex items-center justify-center gap-2 py-2 px-3 rounded-lg text-sm font-medium" onclick="applyPreset('split')">
            <i data-lucide="layout-template" size="14"></i> 分割式
          </button>
          <button class="preset-btn flex items-center justify-center gap-2 py-2 px-3 rounded-lg text-sm font-medium" onclick="applyPreset('minimal')">
            <i data-lucide="minus" size="14"></i> 极简式
          </button>
          <button class="preset-btn flex items-center justify-center gap-2 py-2 px-3 rounded-lg text-sm font-medium" onclick="applyPreset('typography')">
            <i data-lucide="type" size="14"></i> 排版式
          </button>
        </div>
      </div>

      <!-- Reset -->
      <div class="pt-4 border-t border-gray-100">
        <button onclick="resetToDefault()" class="w-full flex items-center justify-center gap-2 py-2 rounded-lg border border-red-200 text-red-600 hover:bg-red-50 text-sm font-medium transition-colors">
          <i data-lucide="rotate-ccw" size="14"></i>
          重置为默认
        </button>
      </div>
    </div>

    <div id="right-toggle" class="toggle-btn" onclick="togglePanel('right')" title="折叠/展开">
      <i data-lucide="chevron-right" size="16"></i>
    </div>
  </aside>

  <script>
    // ==================== 主题定义 ====================
    const STYLES = [
      { id: "minimal", name: "浅蓝风", bg: "#EBF5FB", text: "#1E3A5F", accent: "#3498DB", title: "#1E3A5F" },
      { id: "serif", name: "书卷风", bg: "#F2EFE9", text: "#2c2c2c", accent: "#B85C5C", title: "#2c2c2c" },
      { id: "acid", name: "冲击波", bg: "#CCFF00", text: "#000000", accent: "#000000", title: "#000000" },
      { id: "tech", name: "科技风", bg: "#0F172A", text: "#E2E8F0", accent: "#3B82F6", title: "#FFFFFF" },
    ];

    // 默认状态
    let state = {
      themeId: "minimal",
      title: "小红书封面标题",
      subtitle: "这是我的封面简介内容",
      date: "",
      author: "@我的账号",
      titleSize: 42,
      subtitleSize: 16,
      titleFont: "Inter",
      subtitleFont: "Inter",
      spacing: 24,
      textPosition: "left",
      layoutDirection: "vertical",
      padding: 40,
      coverImage: null,
      showGrid: false,
      showOverlay: true,
      overlayOpacity: 0.4,
      // 自定义颜色 (null = 使用默认主题色)
      customColors: {
        bg: null,
        text: null,
        accent: null,
        title: null,
      },
    };

    // ==================== 图片处理 ====================
    function handleCoverImage(input) {
      const file = input.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        state.coverImage = event.target.result;

        // 更新左侧面板的图片预览
        const coverPreview = document.getElementById('cover-preview');
        const coverPlaceholder = document.getElementById('cover-placeholder');
        const clearCoverBtn = document.getElementById('clear-cover-btn');
        coverPreview.src = event.target.result;
        coverPreview.style.display = 'block';
        coverPlaceholder.style.display = 'none';
        clearCoverBtn.style.display = 'block';

        updatePreview();
        saveState();
      };
      reader.readAsDataURL(file);
    }

    function clearCover() {
      state.coverImage = null;
      document.getElementById('cover-image-upload').value = '';

      // 重置左侧面板的图片预览
      const coverPreview = document.getElementById('cover-preview');
      const coverPlaceholder = document.getElementById('cover-placeholder');
      const clearCoverBtn = document.getElementById('clear-cover-btn');
      coverPreview.style.display = 'none';
      coverPlaceholder.style.display = 'flex';
      clearCoverBtn.style.display = 'none';

      updatePreview();
      saveState();
    }

    // ==================== 主题系统 ====================
    function renderThemeGrid() {
      const grid = document.getElementById('theme-grid');
      grid.innerHTML = '';
      STYLES.forEach(style => {
        const btn = document.createElement('button');
        const isActive = style.id === state.themeId;
        btn.className = `theme-btn p-3 rounded-xl border text-sm font-bold flex items-center justify-center gap-2 relative ${isActive ? 'active' : 'border-gray-200 hover:border-red-300'}`;
        btn.innerHTML = `<div class="w-3 h-3 rounded-full" style="background-color: ${style.bg}; border: ${isActive ? '2px solid white' : '1px solid #ccc'}"></div> ${style.name.split(' ')[1]}`;
        btn.onclick = () => {
          state.themeId = style.id;
          // 恢复主题默认颜色
          state.customColors = { bg: null, text: null, accent: null, title: null };
          updateThemeInputs();
          renderThemeGrid();
          updatePreview();
          saveState();
        };
        grid.appendChild(btn);
      });
    }

    function updateThemeInputs() {
      const theme = STYLES.find(t => t.id === state.themeId);
      const colors = state.customColors;
      document.getElementById('theme-bg-display').textContent = colors.bg || theme.bg;
      document.getElementById('theme-text-display').textContent = colors.text || theme.text;
      document.getElementById('theme-accent-display').textContent = colors.accent || theme.accent;
      document.getElementById('theme-title-display').textContent = colors.title || theme.title;

      if (colors.bg) document.getElementById('theme-bg-color').value = colors.bg;
      if (colors.text) document.getElementById('theme-text-color').value = colors.text;
      if (colors.accent) document.getElementById('theme-accent-color').value = colors.accent;
      if (colors.title) document.getElementById('theme-title-color').value = colors.title;
    }

    function updateThemeColors() {
      state.customColors.bg = document.getElementById('theme-bg-color').value || null;
      state.customColors.text = document.getElementById('theme-text-color').value || null;
      state.customColors.accent = document.getElementById('theme-accent-color').value || null;
      state.customColors.title = document.getElementById('theme-title-color').value || null;

      updateThemeInputs();
      saveState();
      updatePreview();
    }

    // 获取当前主题颜色
    function getCurrentTheme() {
      const theme = STYLES.find(t => t.id === state.themeId);
      return {
        bg: state.customColors.bg || theme.bg,
        text: state.customColors.text || theme.text,
        accent: state.customColors.accent || theme.accent,
        title: state.customColors.title || theme.title,
        fonts: {
          title: state.titleFont === 'Noto Sans SC' ? '"Noto Sans SC", sans-serif' :
                 state.titleFont === 'Noto Serif SC' ? '"Noto Serif SC", serif' : '"Inter", sans-serif',
          subtitle: state.subtitleFont === 'Noto Sans SC' ? '"Noto Sans SC", sans-serif' :
                    state.subtitleFont === 'Noto Serif SC' ? '"Noto Serif SC", serif' : '"Inter", sans-serif',
        },
      };
    }

    // ==================== 预设系统 ====================
    function applyPreset(preset) {
      const currentTheme = STYLES.find(t => t.id === state.themeId);

      switch (preset) {
        case 'full-image':
          state.padding = 20;
          state.titleSize = 48;
          state.subtitleSize = 18;
          state.spacing = 16;
          break;
        case 'split':
          state.padding = 32;
          state.titleSize = 40;
          state.subtitleSize = 16;
          state.spacing = 24;
          break;
        case 'minimal':
          state.padding = 48;
          state.titleSize = 52;
          state.subtitleSize = 14;
          state.spacing = 32;
          state.showOverlay = false;
          break;
        case 'typography':
          state.padding = 40;
          state.titleSize = 44;
          state.subtitleSize = 17;
          state.spacing = 28;
          state.coverImage = null;
          updatePreview();
          return;
      }

      updatePreview();
      saveState();
    }

    function resetToDefault() {
      state = {
        themeId: "minimal",
        title: "小红书封面标题",
        subtitle: "这是我的封面简介内容",
        date: "",
        author: "@我的账号",
        titleSize: 42,
        subtitleSize: 16,
        titleFont: "Inter",
        subtitleFont: "Inter",
        spacing: 24,
        textPosition: "left",
        layoutDirection: "vertical",
        padding: 40,
        coverImage: null,
        showGrid: false,
        showOverlay: true,
        overlayOpacity: 0.4,
        customColors: { bg: null, text: null, accent: null, title: null },
      };
      updateThemeInputs();
      updateThemeGridSelection();
      saveState();
      updatePreview();
    }

    function updateThemeGridSelection() {
      const theme = STYLES.find(t => t.id === state.themeId);
      if (theme) {
        state.customColors = { bg: null, text: null, accent: null, title: null };
        updateThemeInputs();
      }
    }

    // ==================== 布局设置 ====================
    function setTextAlign(align) {
      state.textPosition = align;
      document.querySelectorAll('[data-value]').forEach(btn => {
        btn.classList.remove('border-red-400', 'bg-red-50');
      });
      document.querySelector(`[data-value="${align}"]`).classList.add('border-red-400', 'bg-red-50');
      updatePreview();
      saveState();
    }

    // ==================== 面板折叠 ====================
    let panelState = {
      left: { width: 380, collapsed: false },
      right: { width: 300, collapsed: false },
    };

    function togglePanel(side) {
      const panel = document.getElementById(`${side}-panel`);
      const btnIcon = document.querySelector(`#${side}-toggle i`);
      panelState[side].collapsed = !panelState[side].collapsed;
      if (panelState[side].collapsed) {
        panelState[side].width = parseInt(panel.style.width);
        panel.style.width = "0px";
        panel.style.padding = "0px";
        panel.style.border = "none";
        btnIcon.setAttribute("data-lucide", side === "left" ? "chevron-right" : "chevron-left");
      } else {
        panel.style.width = panelState[side].width + "px";
        panel.style.removeProperty("padding");
        panel.style.removeProperty("border");
        btnIcon.setAttribute("data-lucide", side === "left" ? "chevron-left" : "chevron-right");
      }
      lucide.createIcons();
    }

    // ==================== 拖拽边框 ====================
    function initResizers() {
      setupResizer("resizer-left", "left-panel", "left");
      setupResizer("resizer-right", "right-panel", "right");
    }

    function setupResizer(resizerId, panelId, side) {
      const resizer = document.getElementById(resizerId);
      const panel = document.getElementById(panelId);
      let isResizing = false;
      const getX = (e) => (e.touches ? e.touches[0].clientX : e.clientX);
      const startResize = (e) => {
        isResizing = true;
        resizer.classList.add("active");
        document.body.style.cursor = "col-resize";
        document.body.classList.add("select-none");
        if (e.touches) e.preventDefault();
      };
      const onMove = (e) => {
        if (!isResizing) return;
        if (panelState[side].collapsed) togglePanel(side);
        const clientX = getX(e);
        let newWidth = side === "left" ? clientX : window.innerWidth - clientX;
        if (newWidth < 100) newWidth = 100;
        if (newWidth > 500) newWidth = 500;
        panel.style.width = newWidth + "px";
        panelState[side].width = newWidth;
      };
      const endResize = () => {
        if (isResizing) {
          isResizing = false;
          resizer.classList.remove("active");
          document.body.style.cursor = "default";
          document.body.classList.remove("select-none");
          saveState();
        }
      };
      resizer.addEventListener("mousedown", startResize);
      document.addEventListener("mousemove", onMove);
      document.addEventListener("mouseup", endResize);
      resizer.addEventListener("touchstart", startResize, { passive: false });
      document.addEventListener("touchmove", onMove, { passive: false });
      document.addEventListener("touchend", endResize);
    }

    // ==================== 核心：渲染与更新 ====================
    function updatePreview() {
      const title = document.getElementById('input-title').value || state.title;
      const subtitle = document.getElementById('input-subtitle').value || state.subtitle;
      const date = document.getElementById('input-date').value || state.date;
      const author = document.getElementById('input-author').value || state.author;

      // 更新状态值
      state.title = title;
      state.subtitle = subtitle;
      state.date = date;
      state.author = author;
      state.titleSize = parseInt(document.getElementById('input-title-size').value);
      state.subtitleSize = parseInt(document.getElementById('input-subtitle-size').value);
      state.titleFont = document.getElementById('input-title-font').value;
      state.subtitleFont = document.getElementById('input-subtitle-font').value;
      state.spacing = parseInt(document.getElementById('input-spacing').value);
      state.padding = parseInt(document.getElementById('input-padding').value);
      state.layoutDirection = document.getElementById('input-layout').value;
      state.showGrid = document.getElementById('show-grid-bg').checked;
      state.showOverlay = document.getElementById('show-overlay').checked;
      state.overlayOpacity = parseFloat(document.getElementById('input-overlay-opacity').value);

      // 更新显示值
      document.getElementById('title-size-val').textContent = state.titleSize + 'px';
      document.getElementById('subtitle-size-val').textContent = state.subtitleSize + 'px';
      document.getElementById('spacing-val').textContent = state.spacing + 'px';
      document.getElementById('padding-val').textContent = state.padding + 'px';

      // 渲染封面
      const canvas = document.getElementById('cover-canvas');
      const theme = getCurrentTheme();

      // 设置画布尺寸
      canvas.style.width = '375px';
      canvas.style.height = '500px';

      // 构建样式
      const cssVars = {
        '--bg': theme.bg,
        '--text': theme.text,
        '--accent': theme.accent,
        '--title': theme.title,
      };

      // 分类css变量字符串
      let variablesStyle = '';
      for (const [key, value] of Object.entries(cssVars)) {
        variablesStyle += `${key}: ${value}; `;
      }

      let overlayHtml = '';
      if (state.showOverlay) {
        overlayHtml = `<div class="absolute inset-0 bg-gradient-to-t from-black/${state.overlayOpacity} to-transparent pointer-events-none"></div>`;
      }

      // 网格背景
      let gridStyle = '';
      if (state.showGrid) {
        gridStyle = `linear-gradient(rgba(255,255,255,0.2) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.2) 1px, transparent 1px)`;
      }

      // 文字对齐样式
      const textAlignStyle = `text-${state.textPosition}`;

      // 构建封面内容
      let coverHtml = '';

      if (state.coverImage) {
        // 有封面图片
        coverHtml = `
          <div class="relative w-full h-full" style="background-color: ${theme.bg};">
            <img src="${state.coverImage}" class="absolute inset-0 w-full h-full object-cover">
            <div class="absolute inset-0 bg-gradient-to-b from-transparent via-transparent to-black/80 pointer-events-none"></div>
            <div class="absolute bottom-0 left-0 right-0 p-${state.padding}">
              ${overlayHtml}
              <div class="${textAlignStyle}">
                <div class="text-xs font-bold mb-3 opacity-90" style="color: ${theme.accent};">
                  ${state.date || '2026.03.02'}
                </div>
                <h1 class="cover-title font-black leading-tight mb-4 break-words" style="font-size: ${state.titleSize}px; ${state.titleFont === 'Noto Sans SC' ? 'font-family: \'Noto Sans SC\', sans-serif;' : state.titleFont === 'Noto Serif SC' ? 'font-family: \'Noto Serif SC\', serif;' : 'font-family: \'Inter\', sans-serif;'} color: ${theme.title};">
                  ${state.title}
                </h1>
                <div class="cover-subtitle leading-relaxed mb-4" style="font-size: ${state.subtitleSize}px; ${state.subtitleFont === 'Noto Sans SC' ? 'font-family: \'Noto Sans SC\', sans-serif;' : state.subtitleFont === 'Noto Serif SC' ? 'font-family: \'Noto Serif SC\', serif;' : 'font-family: \'Inter\', sans-serif;'} color: ${theme.text};">
                  ${state.subtitle}
                </div>
                <div class="flex items-center gap-2 text-xs font-bold opacity-80" style="color: ${theme.title};">
                  <i data-lucide="user" size="14"></i>
                  <span>${state.author}</span>
                </div>
              </div>
            </div>
          </div>
        `;
      } else {
        // 无封面图片 - 纯色背景
        let content = '';
        if (state.layoutDirection === 'vertical') {
          content = `
            <div class="${textAlignStyle}">
              <div class="text-xs font-bold mb-4 uppercase tracking-widest opacity-80" style="color: ${theme.accent};">
                ${state.date || '2026.03.02'}
              </div>
              <h1 class="cover-title font-black leading-tight mb-6 break-words" style="font-size: ${state.titleSize}px; ${state.titleFont === 'Noto Sans SC' ? 'font-family: \'Noto Sans SC\', sans-serif;' : state.titleFont === 'Noto Serif SC' ? 'font-family: \'Noto Serif SC\', serif;' : 'font-family: \'Inter\', sans-serif;'} color: ${theme.title};">
                ${state.title}
              </h1>
              <div class="w-16 h-1 mb-6 mx-auto" style="background-color: ${theme.accent};"></div>
              <div class="cover-subtitle mb-6" style="font-size: ${state.subtitleSize}px; ${state.subtitleFont === 'Noto Sans SC' ? 'font-family: \'Noto Sans SC\', sans-serif;' : state.subtitleFont === 'Noto Serif SC' ? 'font-family: \'Noto Serif SC\', serif;' : 'font-family: \'Inter\', sans-serif;'} color: ${theme.text};">
                ${state.subtitle}
              </div>
              <div class="flex items-center gap-2 text-xs font-bold" style="color: ${theme.text};">
                <i data-lucide="user" size="14"></i>
                <span>${state.author}</span>
              </div>
            </div>
          `;
        } else {
          // Horizontal layout
          content = `
            <div class="${textAlignStyle}">
              <div class="text-xs font-bold mb-3 opacity-70" style="color: ${theme.accent};">
                ${state.date || '2026.03.02'}
              </div>
              <h1 class="cover-title font-black leading-tight mb-4 break-words" style="font-size: ${state.titleSize}px; ${state.titleFont === 'Noto Sans SC' ? 'font-family: \'Noto Sans SC\', sans-serif;' : state.titleFont === 'Noto Serif SC' ? 'font-family: \'Noto Serif SC\', serif;' : 'font-family: \'Inter\', sans-serif;'} color: ${theme.title};">
                ${state.title}
              </h1>
              <div class="cover-subtitle" style="font-size: ${state.subtitleSize}px; ${state.subtitleFont === 'Noto Sans SC' ? 'font-family: \'Noto Sans SC\', sans-serif;' : state.subtitleFont === 'Noto Serif SC' ? 'font-family: \'Noto Serif SC\', serif;' : 'font-family: \'Inter\', sans-serif;'} color: ${theme.text};">
                ${state.subtitle}
              </div>
              <div class="flex items-center gap-2 text-xs font-bold mt-6 pt-4 border-t" style="border-color: ${theme.accent}33; color: ${theme.text};">
                <i data-lucide="user" size="14"></i>
                <span>${state.author}</span>
              </div>
            </div>
          `;
        }

        coverHtml = `
          <div class="relative w-full h-full p-${state.padding} flex flex-col justify-between" style="background-color: ${theme.bg}; ${state.showGrid ? 'background-image: ' + gridStyle + ';' : ''}">
            ${content}
          </div>
        `;
      }

      canvas.innerHTML = coverHtml;
      lucide.createIcons();
    }

    // ==================== 导出功能 ====================
    async function exportCover() {
      const canvas = document.getElementById('cover-canvas');
      const btn = document.querySelector('button[onclick="exportCover()"]');

      const originalText = btn.innerHTML;
      btn.innerHTML = '<i data-lucide="loader-2" class="animate-spin"></i> 导出中...';
      btn.classList.add('opacity-75', 'cursor-wait');

      try {
        const dataUrl = await htmlToImage.toJpeg(canvas, {
          quality: 0.95,
          pixelRatio: 3,
          backgroundColor: '#fff',
          width: canvas.scrollWidth,
          height: canvas.scrollHeight,
        });

        const link = document.createElement('a');
        const filename = `xhs-cover-${Date.now()}.jpg`;
        link.download = filename;
        link.href = dataUrl;
        link.click();

        try {
          const response = await fetch(dataUrl);
          const blob = await response.blob();
          await navigator.clipboard.writeBlob(blob);
          showToast('已导出并复制到剪贴板', 'success');
        } catch (e) {
          showToast('已导出封面', 'success');
        }
      } catch (error) {
        console.error('Export failed:', error);
        showToast('导出失败，请重试', 'error');
      } finally {
        btn.innerHTML = originalText;
        btn.classList.remove('opacity-75', 'cursor-wait');
      }
    }

    function showToast(message, type = 'success') {
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.style.backgroundColor = type === 'success' ? '#FF2442' : '#EF4444';
      toast.innerHTML = `<i data-lucide="${type === 'success' ? 'check-circle' : 'x-circle'}"></i> ${message}`;
      document.body.appendChild(toast);
      lucide.createIcons();

      setTimeout(() => {
        toast.style.animation = 'slideOut 0.3s ease forwards';
        setTimeout(() => toast.remove(), 300);
      }, 2000);
    }

    // ==================== 状态持久化 ====================
    function saveState() {
      localStorage.setItem('xhs-cover-generator', JSON.stringify(state));
    }

    function loadState() {
      const saved = localStorage.getItem('xhs-cover-generator');
      if (!saved) return;
      try {
        const savedState = JSON.parse(saved);
        state = { ...state, ...savedState };
      } catch (e) {
        console.warn('恢复配置失败', e);
      }
    }

    // ==================== 初始化 ====================
    function init() {
      // 设置默认日期
      const today = new Date();
      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, '0');
      const day = String(today.getDate()).padStart(2, '0');
      document.getElementById('input-date').value = `${year}.${month}.${day}`;

      loadState();

      // 初始化输入框
      document.getElementById('input-title').value = state.title;
      document.getElementById('input-subtitle').value = state.subtitle;
      document.getElementById('input-date').value = state.date || '';
      document.getElementById('input-author').value = state.author;
      document.getElementById('input-title-size').value = state.titleSize;
      document.getElementById('input-subtitle-size').value = state.subtitleSize;
      document.getElementById('input-title-font').value = state.titleFont;
      document.getElementById('input-subtitle-font').value = state.subtitleFont;
      document.getElementById('input-spacing').value = state.spacing;
      document.getElementById('input-padding').value = state.padding;
      document.getElementById('input-layout').value = state.layoutDirection;
      document.getElementById('show-grid-bg').checked = state.showGrid;
      document.getElementById('show-overlay').checked = state.showOverlay;
      document.getElementById('input-overlay-opacity').value = state.overlayOpacity;

      // 更新显示值
      document.getElementById('title-size-val').textContent = state.titleSize + 'px';
      document.getElementById('subtitle-size-val').textContent = state.subtitleSize + 'px';
      document.getElementById('spacing-val').textContent = state.spacing + 'px';
      document.getElementById('padding-val').textContent = state.padding + 'px';

      // 初始化主题网格
      renderThemeGrid();
      updateThemeInputs();

      // 初始化文字对齐按钮
      document.querySelectorAll('[data-value]').forEach(btn => {
        if (btn.dataset.value === state.textPosition) {
          btn.classList.add('border-red-400', 'bg-red-50');
        } else {
          btn.classList.remove('border-red-400', 'bg-red-50');
        }
      });

      // 初始化预览
      updatePreview();

      // 初始化拖拽
      initResizers();

      // 图片上传占位符显示逻辑
      const coverPreview = document.getElementById('cover-preview');
      const coverPlaceholder = document.getElementById('cover-placeholder');
      const clearCoverBtn = document.getElementById('clear-cover-btn');
      if (state.coverImage) {
        coverPreview.src = state.coverImage;
        coverPreview.style.display = 'block';
        coverPlaceholder.style.display = 'none';
        clearCoverBtn.style.display = 'block';
      }
    }

    // ==================== 裁剪功能 ====================
    let cropState = {
      isActive: false,
      img: null,
      startX: 0,
      startY: 0,
      currentX: 0,
      currentY: 0,
      selection: null,
      handles: {},
      isDragging: false,
      isResizing: null,
      ratio: '3/4',
    };

    function openCropModal(e) {
      e.stopPropagation();
      if (!state.coverImage) return;

      const overlay = document.createElement('div');
      overlay.className = 'crop-overlay active';
      overlay.innerHTML = `
        <div class="crop-container" style="width: 800px; max-width: 90vw;">
          <div class="crop-canvas-container" id="crop-container">
            <img src="${state.coverImage}" id="crop-img">
          </div>
          <div class="crop-controls">
            <div class="crop-ratio-selector">
              <button class="crop-ratio-btn active" data-ratio="3/4">3:4 (小红书)</button>
              <button class="crop-ratio-btn" data-ratio="16/9">16:9 (横版)</button>
              <button class="crop-ratio-btn" data-ratio="1/1">1:1 (方形)</button>
              <button class="crop-ratio-btn" data-ratio="free">自由</button>
            </div>
            <div style="display: flex; gap: 8px;">
              <button class="crop-btn" onclick="closeCropModal()">取消</button>
              <button class="crop-btn primary" onclick="applyCrop()">应用裁剪</button>
            </div>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);

      // 加载图片后初始化
      const img = document.getElementById('crop-img');
      img.onload = function() {
        initCropSelection(overlay);
        lucide.createIcons();
      };

      // 绑定比例选择
      Array.from(overlay.querySelectorAll('.crop-ratio-btn')).forEach(btn => {
        btn.onclick = function() {
          overlay.querySelectorAll('.crop-ratio-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          cropState.ratio = this.dataset.ratio;
          initCropSelection(overlay);
        };
      });
    }

    function closeCropModal() {
      const overlay = document.querySelector('.crop-overlay');
      if (overlay) overlay.remove();
    }

    function initCropSelection(overlay) {
      const container = document.getElementById('crop-container');
      const img = document.getElementById('crop-img');

      // 清除旧的_selection
      const oldSelection = container.querySelector('.crop-selection');
      if (oldSelection) oldSelection.remove();

      // 计算默认 selection (居中)
      const containerRect = container.getBoundingClientRect();
      const imgRect = img.getBoundingClientRect();
      const scaleX = img.width / imgRect.width;
      const scaleY = img.height / imgRect.height;

      let width, height;
      if (cropState.ratio === '3/4') {
        width = Math.min(imgRect.width * 0.8, imgRect.width * (3/4) / (imgRect.height / imgRect.width));
        height = width * (4/3);
      } else if (cropState.ratio === '16/9') {
        width = Math.min(imgRect.width * 0.8, imgRect.height * (16/9));
        height = width * (9/16);
      } else if (cropState.ratio === '1/1') {
        width = Math.min(imgRect.width, imgRect.height) * 0.8;
        height = width;
      } else {
        width = imgRect.width * 0.6;
        height = imgRect.height * 0.6;
      }

      const x = (imgRect.width - width) / 2;
      const y = (imgRect.height - height) / 2;

      const selection = document.createElement('div');
      selection.className = 'crop-selection';
      selection.style.left = x + 'px';
      selection.style.top = y + 'px';
      selection.style.width = width + 'px';
      selection.style.height = height + 'px';

      // 添加 Handle
      const handles = ['nw', 'ne', 'sw', 'se'];
      handles.forEach(pos => {
        const handle = document.createElement('div');
        handle.className = `crop-handle ${pos}`;
        handle.dataset.pos = pos;
        selection.appendChild(handle);
      });

      container.appendChild(selection);

      cropState.selection = selection;
      cropState.handles = {
        nw: selection.querySelector('.nw'),
        ne: selection.querySelector('.ne'),
        sw: selection.querySelector('.sw'),
        se: selection.querySelector('.se'),
      };

      // 绑定事件
      setupCropEvents(container, selection);
    }

    function setupCropEvents(container, selection) {
      const img = document.getElementById('crop-img');
      const imgRect = img.getBoundingClientRect();

      let startX, startY, startLeft, startTop, startWidth, startHeight;

      // 拖拽整个 selection
      container.addEventListener('mousedown', function(e) {
        if (e.target === selection || e.target === img) {
          e.stopPropagation();
          cropState.isDragging = true;
          cropState.isResizing = null;
          startX = e.clientX;
          startY = e.clientY;
          startLeft = selection.offsetLeft;
          startTop = selection.offsetTop;
          startWidth = selection.offsetWidth;
          startHeight = selection.offsetHeight;
        }
      });

      // Handle 拖拽
      Object.values(cropState.handles).forEach(handle => {
        handle.addEventListener('mousedown', function(e) {
          e.stopPropagation();
          cropState.isDragging = false;
          cropState.isResizing = this.dataset.pos;
          startX = e.clientX;
          startY = e.clientY;
          startLeft = selection.offsetLeft;
          startTop = selection.offsetTop;
          startWidth = selection.offsetWidth;
          startHeight = selection.offsetHeight;
        });
      });

      // 移动和松开事件
      const onMouseMove = function(e) {
        if (!cropState.isActive) return;

        const dx = e.clientX - startX;
        const dy = e.clientY - startY;

        if (cropState.isDragging) {
          let newLeft = startLeft + dx;
          let newTop = startTop + dy;
          selection.style.left = Math.max(0, Math.min(newLeft, img.width - selection.offsetWidth)) + 'px';
          selection.style.top = Math.max(0, Math.min(newTop, img.height - selection.offsetHeight)) + 'px';
        } else if (cropState.isResizing) {
          const maxLeft = selection.offsetLeft + selection.offsetWidth;
          const maxTop = selection.offsetTop + selection.offsetHeight;
          const minSize = 50;

          if (cropState.isResizing === 'se') {
            let newWidth = Math.max(minSize, startWidth + dx);
            let newHeight = Math.max(minSize, startHeight + dy);
            if (cropState.ratio !== 'free') {
              if (cropState.ratio === '3/4') {
                newHeight = newWidth * (4/3);
              } else if (cropState.ratio === '16/9') {
                newHeight = newWidth * (9/16);
              } else if (cropState.ratio === '1/1') {
                newHeight = newWidth;
              }
            }
            selection.style.width = newWidth + 'px';
            selection.style.height = newHeight + 'px';
          } else if (cropState.isResizing === 'sw') {
            let newLeft = Math.max(0, startLeft + dx);
            let newWidth = Math.max(minSize, startWidth - dx);
            let newHeight = startHeight;
            if (cropState.ratio !== 'free') {
              if (cropState.ratio === '3/4') {
                newHeight = newWidth * (4/3);
              } else if (cropState.ratio === '16/9') {
                newHeight = newWidth * (9/16);
              } else if (cropState.ratio === '1/1') {
                newHeight = newWidth;
              }
            }
            selection.style.left = newLeft + 'px';
            selection.style.width = newWidth + 'px';
            selection.style.height = newHeight + 'px';
          } else if (cropState.isResizing === 'ne') {
            let newTop = Math.max(0, startTop + dy);
            let newWidth = Math.max(minSize, startWidth + dx);
            let newHeight = Math.max(minSize, startHeight - dy);
            if (cropState.ratio !== 'free') {
              if (cropState.ratio === '3/4') {
                newHeight = newWidth * (4/3);
              } else if (cropState.ratio === '16/9') {
                newHeight = newWidth * (9/16);
              } else if (cropState.ratio === '1/1') {
                newHeight = newWidth;
              }
            }
            selection.style.top = newTop + 'px';
            selection.style.width = newWidth + 'px';
            selection.style.height = newHeight + 'px';
          } else if (cropState.isResizing === 'nw') {
            let newLeft = Math.max(0, startLeft + dx);
            let newTop = Math.max(0, startTop + dy);
            let newWidth = Math.max(minSize, startWidth - dx);
            let newHeight = Math.max(minSize, startHeight - dy);
            if (cropState.ratio !== 'free') {
              if (cropState.ratio === '3/4') {
                newHeight = newWidth * (4/3);
              } else if (cropState.ratio === '16/9') {
                newHeight = newWidth * (9/16);
              } else if (cropState.ratio === '1/1') {
                newHeight = newWidth;
              }
            }
            selection.style.left = newLeft + 'px';
            selection.style.top = newTop + 'px';
            selection.style.width = newWidth + 'px';
            selection.style.height = newHeight + 'px';
          }
        }
      };

      const onMouseUp = function() {
        cropState.isDragging = false;
        cropState.isResizing = null;
      };

      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup', onMouseUp);
    }

    function applyCrop() {
      const selection = cropState.selection;
      if (!selection) return;

      const img = document.getElementById('crop-img');
      const scaleX = img.naturalWidth / img.width;
      const scaleY = img.naturalHeight / img.height;

      const cropX = selection.offsetLeft * scaleX;
      const cropY = selection.offsetTop * scaleY;
      const cropWidth = selection.offsetWidth * scaleX;
      const cropHeight = selection.offsetHeight * scaleY;

      // 创建临时 canvas 进行裁剪
      const canvas = document.createElement('canvas');
      canvas.width = cropWidth;
      canvas.height = cropHeight;
      const ctx = canvas.getContext('2d');

      // 获取当前状态的图片
      const tempImg = new Image();
      tempImg.src = state.coverImage;
      tempImg.onload = function() {
        ctx.drawImage(tempImg, cropX, cropY, cropWidth, cropHeight, 0, 0, cropWidth, cropHeight);

        // 转换为 base64 并更新
        const croppedDataUrl = canvas.toDataURL('image/jpeg', 0.95);
        state.coverImage = croppedDataUrl;

        // 更新左侧面板
        const coverPreview = document.getElementById('cover-preview');
        coverPreview.src = croppedDataUrl;

        closeCropModal();
        updatePreview();
        saveState();
      };
    }

    // 启动
    window.onload = init;
    lucide.createIcons();
  </script>
</body>
</html>

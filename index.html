<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>小红书图文生成器</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --red-main: #FF2442;
            --red-dark: #E51E3B;
            --red-light: #FF4D6D;
            --bg-gradient: linear-gradient(135deg, #fff5f7 0%, #ffeef2 100%);
            --text-primary: #333;
            --text-secondary: #666;
            --text-tertiary: #999;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 16px;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        header {
            text-align: center;
            margin-bottom: 32px;
            width: 100%;
            max-width: 750px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--red-main), var(--red-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 18px;
            font-weight: 800;
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.01em;
            line-height: 1.3;
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 8px;
        }

        /* Main Content */
        main {
            width: 100%;
            max-width: 750px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px 16px;
            text-decoration: none;
            color: var(--text-primary);
            box-shadow: 0 4px 12px rgba(255, 36, 66, 0.08);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(255, 36, 66, 0.06);
            touch-action: manipulation;
        }

        /* .card::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 3px;
            height: 100%;
            background: linear-gradient(180deg, var(--red-main), var(--red-light));
        } */

        .card:hover {
            box-shadow: 0 8px 20px rgba(255, 36, 66, 0.12);
            border-color: rgba(255, 36, 66, 0.15);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            background: linear-gradient(135deg, #fff0f3 0%, #ffe5ec 100%);
            color: var(--red-main);
        }

        .card-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 12px;
            background: var(--red-main);
            color: white;
            white-space: nowrap;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .card-desc {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.5;
            margin-bottom: 16px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card-stats {
            display: flex;
            gap: 14px;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-tertiary);
        }

        .stat-value {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        .card-arrow {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--red-main);
            color: white;
            flex-shrink: 0;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding-top: 24px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 12px;
            width: 100%;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
        }

        .footer-links a:hover {
            color: var(--red-main);
        }

        /* Media Queries */
        @media (min-width: 768px) {
            h1 {
                font-size: 32px;
            }
            .card {
                padding: 28px 24px;
                flex-direction: row;
                align-items: center;
                gap: 20px;
            }
            .card::before {
                width: 4px;
                height: 4px;
                top: 50%;
                left: 0;
                transform: translateY(-50%);
            }
            .card:hover::before {
                width: 100%;
                height: 4px;
                top: 0;
                transform: translateY(0);
            }
            .card-header {
                flex-direction: column;
                align-items: flex-start;
                margin-bottom: 0;
                min-width: 160px;
            }
            .card-icon {
                width: 56px;
                height: 56px;
                font-size: 24px;
                margin-bottom: 8px;
            }
            .card-tag {
                align-self: flex-start;
            }
            .card-title {
                font-size: 22px;
                margin-bottom: 10px;
            }
            .card-desc {
                font-size: 14px;
                -webkit-line-clamp: 3;
            }
            .card-stats {
                gap: 20px;
            }
            .stat-label {
                font-size: 11px;
            }
            .stat-value {
                font-size: 14px;
            }
            .card-arrow {
                width: 32px;
                height: 32px;
                margin-left: auto;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <div class="logo-icon">R</div>
            <h1>小红书图文生成器</h1>
        </div>
        <p class="subtitle">专业的小红书笔记和封面生成工具</p>
    </header>

    <main>
        <a href="./views/cover.html" class="card">
            <div class="card-header">
                <div class="card-icon">🎨</div>
                <span class="card-tag">NEW</span>
            </div>
            <div style="flex: 1;">
                <h2 class="card-title">封面生成器</h2>
                <p class="card-desc">高度可定制的小红书封面生成器。4种主题风格、图片上传、文字样式、颜色自定义、布局预设，轻松制作爆款封面！</p>
                <div class="card-stats">
                    <div class="stat-item">
                        <span class="stat-label">模板</span>
                        <span class="stat-value">4种风格</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">导出</span>
                        <span class="stat-value">JPG/PNG</span>
                    </div>
                </div>
            </div>
            <div class="card-arrow">→</div>
        </a>

        <a href="./views/note.html" class="card">
            <div class="card-header">
                <div class="card-icon">📝</div>
                <span class="card-tag">推荐</span>
            </div>
            <div style="flex: 1;">
                <h2 class="card-title">图文生成器</h2>
                <p class="card-desc">支持 Markdown 编辑的全能图文生成工具。自动分页、图片管理、批量导出，一站式创作体验！</p>
                <div class="card-stats">
                    <div class="stat-item">
                        <span class="stat-label">编辑</span>
                        <span class="stat-value">Markdown</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">风格</span>
                        <span class="stat-value">4种主题</span>
                    </div>
                </div>
            </div>
            <div class="card-arrow">→</div>
        </a>
    </main>

    <footer>
        <div class="footer-links">
            <a href="https://www.xiaohongshu.com" target="_blank">小红书官网</a>

        </div>
        <p>© 2026 小红书图文生成器</p>
    </footer>
</body>
</html>
